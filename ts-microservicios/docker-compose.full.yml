
#                                                                           
#   Levanta: MySQL + 3 microservicios + BFF + Frontend                     
#                                                                           
#   Uso:                                                                    
#     docker compose -f docker-compose.full.yml up --build                 
#     docker compose -f docker-compose.full.yml down -v   (limpia todo)    
#                                                                         
#    Acceso:                                                                 
#    Frontend  → http://localhost:80                                       
#    BFF       → http://localhost:3000                                     
#    Health    → http://localhost:3000/health                              


services:

  # MySQL 
  mysql:
    image: mysql:8.0
    container_name: saludrednorte-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rednorte123
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prednorte123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - saludrednorte-net

  # servicio-paciente (:3001)
  servicio-paciente:
    build:
      context: ./servicio-paciente
      dockerfile: Dockerfile
    container_name: saludrednorte-paciente
    restart: unless-stopped
    environment:
      PORT: 3001
      # Usa el nombre del servicio Docker como hostname, no localhost
      DATABASE_URL: "mysql://root:rednorte123@mysql:3306/db_paciente"
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - saludrednorte-net

  # servicio-solicitudes (:3002) 
  servicio-solicitudes:
    build:
      context: ./servicio-solicitudes
      dockerfile: Dockerfile
    container_name: saludrednorte-solicitudes
    restart: unless-stopped
    environment:
      PORT: 3002
      DATABASE_URL: "mysql://root:rednorte123@mysql:3306/db_solicitudes"
    ports:
      - "3002:3002"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - saludrednorte-net

  # servicio-lista-espera (:3003) 
  servicio-lista-espera:
    build:
      context: ./servicio-lista-espera
      dockerfile: Dockerfile
    container_name: saludrednorte-lista-espera
    restart: unless-stopped
    environment:
      PORT: 3003
      DATABASE_URL: "mysql://root:rednorte123@mysql:3306/db_lista_espera"
    ports:
      - "3003:3003"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - saludrednorte-net

  #  BFF (:3000) 
  bff:
    build:
      context: ./bff
      dockerfile: Dockerfile
    container_name: saludrednorte-bff
    restart: unless-stopped
    environment:
      PORT: 3000
      
      PACIENTE_SERVICE_URL: http://servicio-paciente:3001
      SOLICITUD_SERVICE_URL: http://servicio-solicitudes:3002
      LISTA_ESPERA_SERVICE_URL: http://servicio-lista-espera:3003
    ports:
      - "3000:3000"
    depends_on:
      - servicio-paciente
      - servicio-solicitudes
      - servicio-lista-espera
    networks:
      - saludrednorte-net

  #  Frontend ( :80) 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saludrednorte-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - bff
    networks:
      - saludrednorte-net


networks:
  saludrednorte-net:
    driver: bridge


volumes:
  mysql_data:
    driver: local
